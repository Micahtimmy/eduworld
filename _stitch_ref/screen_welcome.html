<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .bg-custom-deep-blue {
            background-color: #0F2340; /* Requested specifically by user prompt, normally use theme colors */
        }

        /* Abstract Node Animation */
        .node-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }

        .node {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.2);
            animation: float 20s infinite ease-in-out alternate;
        }

        .connection {
            position: absolute;
            background: linear-gradient(to right, rgba(255,255,255,0.1), transparent);
            height: 1px;
            transform-origin: left center;
            opacity: 0;
            animation: pulse-connection 10s infinite;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(calc(10vw - 5vw), calc(10vh - 5vh)); }
        }

        @keyframes pulse-connection {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.2; }
        }

        /* Generate some nodes */
        .n1 { top: 20%; left: 15%; animation-delay: 0s; }
        .n2 { top: 60%; left: 25%; animation-delay: -5s; }
        .n3 { top: 30%; left: 75%; animation-delay: -10s; }
        .n4 { top: 70%; left: 80%; animation-delay: -15s; }
        .n5 { top: 85%; left: 45%; animation-delay: -2s; }
        .n6 { top: 15%; left: 55%; animation-delay: -7s; }
        .n7 { top: 45%; left: 50%; animation-delay: -12s; width: 6px; height: 6px; background-color: rgba(108, 248, 187, 0.6); box-shadow: 0 0 15px 3px rgba(108, 248, 187, 0.3);} /* Emerald highlight */

        /* Connections */
        .c1 { top: 20%; left: 15%; width: 45%; transform: rotate(20deg); animation-delay: 0s; }
        .c2 { top: 45%; left: 50%; width: 30%; transform: rotate(-30deg); animation-delay: -3s; }
        .c3 { top: 60%; left: 25%; width: 25%; transform: rotate(15deg); animation-delay: -6s; }
        .c4 { top: 45%; left: 50%; width: 40%; transform: rotate(45deg); animation-delay: -9s; }
    </style>

<script>
        // Simple subtle parallax effect for the nodes based on mouse movement
        document.addEventListener('mousemove', (e) => {
            const nodes = document.querySelectorAll('.node');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            nodes.forEach((node, index) => {
                const speed = (index + 1) * 0.5;
                const moveX = (x - 0.5) * speed * 20;
                const moveY = (y - 0.5) * speed * 20;
                node.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
